spring.application.name=ventas-service
server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/ventas_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

logging.level.com.mollystore=DEBUG
logging.file.name=logs/ventas-service.log

# JWT Configuration
jwt.secret=mollystore-secret-key-change-in-production-at-least-256bits-long
jwt.expiration=86400000

# URLs de otros microservicios
sincronizacion.service.url=http://localhost:8085
pagos.service.url=http://localhost:8087
