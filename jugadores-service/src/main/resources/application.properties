spring.application.name=jugadores-service
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/jugadores_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

logging.level.com.mollystore=DEBUG
logging.file.name=logs/jugadores-service.log

# JWT Configuration
jwt.secret=mollystore-secret-key-change-in-production-at-least-256bits-long
jwt.expiration=86400000
