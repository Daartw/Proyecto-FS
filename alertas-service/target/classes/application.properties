server.port=8090
spring.application.name=alertas-service

# =============================================
# BASE DE DATOS - PostgreSQL (Produccion)
# =============================================
# Para usar PostgreSQL, descomenta estas lineas y comenta la seccion H2:
# spring.datasource.url=jdbc:postgresql://localhost:5432/alertasdb
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# spring.jpa.hibernate.ddl-auto=update

# =============================================
# BASE DE DATOS - H2 En Memoria (Desarrollo)
# =============================================
spring.datasource.url=jdbc:h2:mem:alertasdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# LOGGING (Semana 10)
# =============================================
logging.level.com.mollystore=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/alertas-service.log
